log_format mealieformat '$http_x_forwarded_for $remote_addr [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $upstream_response_time';

# HTTP to HTTPS Redirect (Both www and non-www)
server {
    listen 80;
    server_name mealie.tuerto.net www.mealie.tuerto.net;
    return 301 https://$host$request_uri;
}

# Main HTTPS Server
server {
    listen 443 ssl;
    server_name mealie.tuerto.net www.mealie.tuerto.net;

    ssl_certificate /etc/letsencrypt/live/tuerto.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tuerto.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    location / {
        # REMOVED the trailing slash here:
        proxy_pass http://192.168.0.95:9925;
        
        # Cleaned up headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Keep-alive and timeouts
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 1200s;
        proxy_connect_timeout 75s;
        
        # Upload size
        client_max_body_size 0;
        
        access_log /var/log/nginx/mealie.access.log mealieformat;
        error_log  /var/log/nginx/mealie.error.log;
    }
}
