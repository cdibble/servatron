        proxy_set_header Connection "";
        # used for view/edit office file via Office Online Server
        client_max_body_size 0;
        access_log      /var/log/nginx/cerca.access.log cercaformat;
        error_log       /var/log/nginx/cerca.error.log;
    }

    location / {
        proxy_pass http://192.168.0.95:5173/;
        proxy_set_header   Host $http_host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 1200s;
        proxy_connect_timeout   75s;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Forwarded "for=$remote_addr;proto=$scheme";
        proxy_set_header Connection "";
        # used for view/edit office file via Office Online Server
        client_max_body_size 0;
        access_log      /var/log/nginx/cerca.access.log cercaformat;
        error_log       /var/log/nginx/cerca.error.log;
    }



    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tuerto.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tuerto.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = cerca.tuerto.net) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name cerca.tuerto.net;
    listen 80;
    return 404; # managed by Certbot


