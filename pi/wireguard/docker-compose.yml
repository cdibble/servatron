volumes:
 etc_wireguard:
services:
 wg-easy:
 environment:
 - LANG=en
 - WG_HOST=<Public IP>
 - WG_PORT=9443
 - WG_ALLOWED_IPS=192.168.1.18/32, 192.168.1.23/32
 - WG_PRE_UP=iptables -I FORWARD -s 10.8.0.1/24 -o eth0 -j DROP; iptables -I FORWARD -s 10.8.0.1/24 -d 192.168.1.18/32 -j ACCEPT;
 image: ghcr.io/wg-easy/wg-easy
 container_name: wg-easy
 volumes:
 - etc_wireguard:/etc/wireguard
 ports:
 - "9443:51820/udp"
 - "51821:51821/tcp"
 restart: unless-stopped
 cap_add:
 - NET_ADMIN
 - SYS_MODULE
 sysctls:
 - net.ipv4.ip_forward=1
 - net.ipv4.conf.all.src_valid_mark=1
